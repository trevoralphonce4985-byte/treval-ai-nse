# render.yaml — Render Blueprint for Treval AI NSE (Free Tier)
services:
  - type: web
    name: treval-ai-nse
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
    healthCheckPath: /health
    autoDeploy: true  # 🔑 AUTO-DEPLOY ON PUSH TO main
    gitBranch: main   # Deploy from 'main' branch
